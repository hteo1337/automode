name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --run
      - name: Verify package.json version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json $PKG_VERSION" >&2
            exit 1
          fi
      - name: Publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Use npm config set so the token is written literally into .npmrc
          # without YAML / shell variable expansion surprises.
          npm config set "//registry.npmjs.org/:_authToken" "$NPM_TOKEN"
          npm config set "registry" "https://registry.npmjs.org/"
          # Sanity: confirm whoami works before publishing.
          npm whoami
          npm publish --access public
